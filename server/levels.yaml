# Declarative execution profiles for med-agent-hub.
#
# This catalog contains current product profiles, matched evaluation controls,
# and one quarantined high-team debug profile. Historical experiment ids remain
# available from their pinned Git revisions and run manifests. Dynamic answer:,
# answer-review:, and indepth-only: legs are parsed by levels_loader.py.

stage_sets:
  single_answer: &single_answer [context, answer, gate]
  product: &product [context, answer, gate, resolve_refs, review, gate, final_resolve_refs, ground_verdicts, indepth, indepth_gate]
  team_product: &team_product [context, gather, answer, gate, resolve_refs, review, gate, final_resolve_refs, ground_verdicts, indepth, indepth_gate]

profiles:
  single-e4b-checked:
    label: Fast checked answer (E4B)
    topology: single
    stages: *product
    models: {answer: gemma-e4b, review: gemma-e4b, grounding: gemma-e4b, indepth: gemma-e4b}
    prompts: {answer: synthesis-answer, review: validation-rewrite, indepth: synthesis-indepth}
    policies: {output: product, temporal_gate: enforce, temporal_render: full, drug_safety: true}
    visibility: product
    default: true
    selection_priority: 10
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}
    knobs: {answer: {temperature: 0}}

  single-e2b-checked:
    label: Experimental fast answer (E2B, E4B check)
    topology: single
    stages: *product
    models: {answer: gemma-e2b, review: gemma-e4b, grounding: gemma-e4b, indepth: gemma-e4b}
    prompts: {answer: synthesis-answer, review: validation-rewrite, indepth: synthesis-indepth}
    policies: {output: product, temporal_gate: enforce, temporal_render: full, drug_safety: true}
    visibility: product
    selection_priority: 15
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}
    knobs: {answer: {temperature: 0}}

  single-a4b-checked:
    label: Efficient checked answer (A4B)
    topology: single
    stages: *product
    models: {answer: gemma-26b, review: gemma-26b, grounding: gemma-26b, indepth: gemma-26b}
    prompts: {answer: synthesis-answer, review: validation-rewrite, indepth: synthesis-indepth}
    policies: {output: product, temporal_gate: enforce, temporal_render: full, drug_safety: true}
    visibility: product
    selection_priority: 20
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}
    knobs: {answer: {temperature: 0}}

  single-12b-checked:
    label: Checked answer (12B)
    topology: single
    stages: *product
    models: {answer: gemma-4-12b, review: gemma-4-12b, grounding: gemma-4-12b, indepth: gemma-4-12b}
    prompts: {answer: synthesis-answer, review: validation-rewrite, indepth: synthesis-indepth}
    policies: {output: product, temporal_gate: enforce, temporal_render: full, drug_safety: true}
    visibility: product
    selection_priority: 30
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}
    knobs: {answer: {temperature: 0}}

  team-med-checked:
    label: Checked medical team
    topology: team
    stages: *team_product
    models: {orchestrator: gemma-e4b-q8, expert: medgemma-1.5-4b-q8, answer: qwen2.5-14b, review: gemma-4-12b, grounding: qwen2.5-14b, indepth: qwen2.5-14b}
    prompts: {answer: synthesis-answer, review: validation-rewrite, indepth: synthesis-indepth, orchestrator: orchestrator, expert: medical_expert}
    policies: {output: product, temporal_gate: enforce, temporal_render: full, drug_safety: true}
    visibility: product
    selection_priority: 100
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}

  # Quarantined from product discovery and publishable candidate runs. This one
  # explicit profile preserves targeted high-team failure analysis without
  # retaining the historical experiment matrix in the runtime catalog.
  debug-team-high-checked:
    label: Debug high-capacity checked team
    topology: team
    stages: *team_product
    models: {orchestrator: gemma-31b, expert: medgemma-27b, answer: qwen3.6-35b-q6, review: gemma-31b, grounding: qwen3.6-35b-q6, indepth: qwen3.6-35b-q6}
    prompts: {answer: synthesis-answer, review: validation-rewrite, indepth: synthesis-indepth, orchestrator: orchestrator, expert: medical_expert}
    policies: {output: product, temporal_gate: enforce, temporal_render: full, drug_safety: true}
    visibility: debug
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}

  # Matched controls for the current small-model Answer-path comparison. These
  # are hidden from product clients and differ only in model or gate policy.
  eval-e4b-answer-only:
    label: E4B answer only
    topology: single
    stages: *single_answer
    models: {answer: gemma-e4b}
    prompts: {answer: synthesis-answer}
    policies: {output: bare, answer_contract: chart_answer, temporal_gate: "off", temporal_render: full}
    visibility: evaluation
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}
    knobs: {answer: {temperature: 0}}

  eval-e4b-temporal-enforce:
    label: E4B deterministic temporal check
    topology: single
    stages: *single_answer
    models: {answer: gemma-e4b}
    prompts: {answer: synthesis-answer}
    policies: {output: bare, answer_contract: chart_answer, temporal_gate: enforce, temporal_render: full}
    visibility: evaluation
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}
    knobs: {answer: {temperature: 0}}

  eval-12b-answer-only:
    label: 12B answer only
    topology: single
    stages: *single_answer
    models: {answer: gemma-4-12b}
    prompts: {answer: synthesis-answer}
    policies: {output: bare, answer_contract: chart_answer, temporal_gate: "off", temporal_render: full}
    visibility: evaluation
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}
    knobs: {answer: {temperature: 0}}

  eval-12b-temporal-enforce:
    label: 12B deterministic temporal check
    topology: single
    stages: *single_answer
    models: {answer: gemma-4-12b}
    prompts: {answer: synthesis-answer}
    policies: {output: bare, answer_contract: chart_answer, temporal_gate: enforce, temporal_render: full}
    visibility: evaluation
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true, supplemental_sources: [knowledge-base]}
    knobs: {answer: {temperature: 0}}
