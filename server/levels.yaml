# Declarative execution profiles for med-agent-hub.
#
# Every configured id declares an ordered stage plan and the model assigned to
# each role. Dynamic answer:, answer-review:, and indepth-only: legs are parsed
# by levels_loader.py and intentionally are not advertised here.

stage_sets:
  team_combined: &team_combined [context, gather, answer, gate, indepth]
  team_reviewed: &team_reviewed [context, gather, answer, gate, review, gate, indepth]
  team_bare: &team_bare [context, gather, answer, gate]
  team_bare_reviewed: &team_bare_reviewed [context, gather, answer, gate, review, gate]
  single_bare: &single_bare [context, answer, gate]
  single_bare_reviewed: &single_bare_reviewed [context, answer, gate, review, gate]
  single_combined: &single_combined [context, answer, gate, indepth]
  product: &product [context, answer, gate, resolve_refs, review, gate, final_resolve_refs, ground_verdicts, indepth, indepth_gate]
  product_no_review: &product_no_review [context, answer, gate, resolve_refs, final_resolve_refs, ground_verdicts, indepth, indepth_gate]
  team_product: &team_product [context, gather, answer, gate, resolve_refs, review, gate, final_resolve_refs, ground_verdicts, indepth, indepth_gate]

profiles:
  med-agent-team-low:
    label: Low team
    topology: team
    stages: *team_combined
    models: {orchestrator: gemma-e2b-q2, expert: medgemma-1.5-4b, answer: qwen3-4b, indepth: qwen3-4b}
    policies: {output: combined, temporal_gate: "off"}

  med-agent-team-low-validated:
    label: Low team with E4B review
    topology: team
    stages: *team_reviewed
    models: {orchestrator: gemma-e2b-q2, expert: medgemma-1.5-4b, answer: qwen3-4b, review: gemma-e4b-q8, indepth: qwen3-4b}
    policies: {output: combined, temporal_gate: "off"}
    capabilities: {validation: true}

  med-agent-team-low-validated-12b:
    label: Low team with 12B review
    topology: team
    stages: *team_product
    models: {orchestrator: gemma-e2b-q2, expert: medgemma-1.5-4b, answer: qwen3-4b, review: gemma-4-12b, grounding: qwen3-4b, indepth: qwen3-4b}
    prompts: {review: validation}
    policies: {output: product, temporal_gate: enforce, temporal_render: full}
    capabilities: {staged: true, validation: true}
    context: {window: 24576, reserved_output_tokens: 4096, exact_tokenizer: true}

  med-agent-team-med:
    label: Medium team
    topology: team
    stages: *team_combined
    models: {orchestrator: gemma-e4b-q8, expert: medgemma-1.5-4b-q8, answer: qwen2.5-14b, indepth: qwen2.5-14b}
